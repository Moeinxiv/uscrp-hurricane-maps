<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>USCRP Hurricane Maps — Animated Inundation & Wind</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html,body,#map{width:100%;height:100%;margin:0;padding:0}
  #map{background:#eef}
  .ui-panel{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.4);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#2c3e50}
  .ui-panel h4{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:#5c6c7c;
    border-bottom:1px solid rgba(0,0,0,.08);padding-bottom:6px;text-align:center;font-weight:700}
  #timeline{position:absolute;left:50%;transform:translateX(-50%);bottom:22px;z-index:9999;width:min(780px,94vw);padding:14px 18px}
  #timeline .row{display:flex;align-items:center;gap:12px}
  #playBtn{flex:0 0 auto;width:42px;height:42px;border:none;border-radius:50%;cursor:pointer;background:#3498db;
    color:#fff;font-size:16px;box-shadow:0 2px 6px rgba(52,152,219,.45);transition:background .2s,transform .1s}
  #playBtn:hover{background:#2980b9;transform:scale(1.05)}
  #scrub{flex:1 1 auto}
  #tlabel{flex:0 0 auto;font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;min-width:165px;text-align:right}
  input[type=range]{-webkit-appearance:none;height:6px;border-radius:4px;background:#e2e8f0;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#3498db;cursor:pointer;box-shadow:0 2px 5px rgba(52,152,219,.4)}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:#3498db;cursor:pointer}
  #timeline .controls{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:14px;font-size:12px;color:#34495e;flex-wrap:wrap}
  #timeline .controls label{display:flex;align-items:center;gap:6px;font-weight:600}
  .seg{display:inline-flex;border:1px solid #cbd5e1;border-radius:8px;overflow:hidden}
  .seg button{border:none;background:#fff;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600;color:#5c6c7c}
  .seg button.active{background:#3498db;color:#fff}
  #ctrl{position:absolute;top:14px;right:14px;z-index:9999;padding:14px 16px;width:230px}
  #ctrl .grp{margin-bottom:12px}
  #ctrl .grp:last-child{margin-bottom:0}
  #ctrl .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#5c6c7c;margin-bottom:6px}
  #ctrl label.op{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:#34495e;margin-bottom:5px}
  #legend{position:absolute;right:14px;bottom:160px;z-index:9999;padding:12px 14px;font-size:12px}
  #legend .row{display:flex;align-items:center;margin:3px 0}
  #legend .sw{width:14px;height:14px;border-radius:4px;margin-right:8px;border:1px solid rgba(0,0,0,.15)}
  #info{position:absolute;top:14px;left:14px;z-index:9999;padding:10px 14px;font-size:13px;min-width:180px}
  #banner{position:absolute;top:0;left:0;right:0;z-index:10000;background:#b45309;color:#fff;
    font:600 12px/1.4 -apple-system,Segoe UI,Roboto,sans-serif;text-align:center;padding:5px 10px;display:none}
</style>
</head>
<body>
<div id="banner"></div>
<div id="map"></div>
<div id="info" class="ui-panel">Hover the map for values…</div>

<div id="ctrl" class="ui-panel">
  <div class="grp"><div class="lbl">Event</div>
    <div class="seg" id="eventseg">
      <button data-ev="harvey" class="active">Harvey</button>
      <button data-ev="rita">Rita</button>
      <button data-ev="ike">Ike</button>
    </div>
  </div>
  <div class="grp"><div class="lbl">Scenario</div>
    <div class="seg" id="scenseg">
      <button data-scen="historical" class="active">Historical</button>
      <button data-scen="future">Future</button>
      <button data-scen="diff" title="Future minus Historical peak depth">Δ Fut−Hist</button>
    </div>
  </div>
  <div class="grp"><div class="lbl">Variable</div>
    <div class="seg" id="varseg">
      <button data-var="depth">Depth</button>
      <button data-var="rise" class="active">Rise</button>
      <button data-var="wind">Wind</button>
    </div>
  </div>
  <div class="grp"><div class="lbl">Infrastructure</div>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#34495e;margin-bottom:5px"><input type="checkbox" id="pipeCrude" checked> Crude oil pipelines</label>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#34495e"><input type="checkbox" id="pipeGas" checked> Natural gas pipelines</label>
  </div>
  <div class="grp">
    <label class="op"><span>Layer opacity</span><span id="opval">85%</span></label>
    <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.85" style="width:100%">
  </div>
</div>

<div id="legend" class="ui-panel"><h4 id="legTitle">Max Depth (m)</h4><div id="legRows"></div></div>

<div id="timeline" class="ui-panel">
  <div class="row">
    <button id="playBtn" title="Play/Pause">▶</button>
    <input type="range" id="scrub" min="0" max="0" step="1" value="0">
    <span id="tlabel">—</span>
  </div>
  <div class="controls">
    <label>Speed
      <select id="speed"><option value="1000">Slow</option><option value="600" selected>Normal</option><option value="300">Fast</option></select>
    </label>
    <label><input type="checkbox" id="hoverToggle"> Hover values (auto when paused)</label>
    <span id="mode" style="opacity:.7">loading…</span>
  </div>
</div>

<script src="data/CrudeOil_4.js"></script>
<script src="data/NaturalGas_3.js"></script>
<script>
/* =====================================================================
   USCRP Hurricane Maps — animated inundation + wind, all events.
   Frames from extract_flowfm_nc.py (6-hourly, EPSG:3857 grid on the
   existing map bounds; sea-masked depth + edge-trimmed).
   Layout: data/frames/<event>_<scenario>/{manifest_<var>.json, <var>/frame_NNN.png}
   Hover reads the frame pixel colour -> legend band (TIFs not shipped).
   ===================================================================== */
const DATA_DIR="data/frames/";
const EVENTS=["harvey","rita","ike"];
const SCENARIOS=["historical","future"];
const VARS=["depth","rise","wind"];
const BOUNDS=[[28.974991429868123,-94.33611991576419],[30.227087808884963,-93.48667298310077]];
const DEPTH_RAMP=[[0.1,1,[70,98,216]],[1,2,[53,171,248]],[2,3,[27,229,181]],[3,4,[116,254,93]],
  [4,5,[201,239,52]],[5,7.5,[251,185,56]],[7.5,10,[245,105,24]],[10,15,[201,41,3]],[15,99,[122,4,3]]];
const WIND_RAMP=[[0,8,[237,248,251]],[8,17,[179,205,227]],[17,25,[140,150,198]],[25,33,[136,86,167]],
  [33,43,[129,15,124]],[43,50,[255,178,76]],[50,58,[253,141,60]],[58,70,[240,59,32]],[70,99,[189,0,38]]];
const RISE_RAMP=[[0.05,0.1,[215,235,255]],[0.1,0.2,[170,205,245]],[0.2,0.3,[110,170,230]],[0.3,0.4,[60,180,170]],
  [0.4,0.5,[120,205,90]],[0.5,0.75,[215,215,70]],[0.75,1.0,[250,170,55]],[1.0,1.5,[240,110,45]],[1.5,99,[200,40,40]]];
const DIFF_RAMP=[[-99,-0.5,[33,102,172]],[-0.5,-0.2,[103,169,207]],[-0.2,-0.05,[180,210,235]],
  [0.05,0.2,[250,200,170]],[0.2,0.5,[239,138,98]],[0.5,99,[178,24,43]]];
const VARDEF={depth:{ramp:DEPTH_RAMP,units:'m',legend:'Max water depth (m)'},
              rise:{ramp:RISE_RAMP,units:'m',legend:'Water rise (m)'},
              wind:{ramp:WIND_RAMP,units:'m/s',legend:'Wind speed (m/s)'},
              diff:{ramp:DIFF_RAMP,units:'m',legend:'Future − Historical (m)',diverging:true}};

const map=L.map('map',{zoomControl:true}).fitBounds(BOUNDS);
L.tileLayer('https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd',maxZoom:19,attribution:'© OpenStreetMap © CARTO'}).addTo(map);
let overlay=L.imageOverlay('',BOUNDS,{opacity:0.85,interactive:false}).addTo(map);

// --- infrastructure (pipelines), drawn above the animated depth/wind layer ---
map.createPane('pipes'); map.getPane('pipes').style.zIndex=500;
const crudeLayer=L.geoJSON(typeof json_CrudeOil_4!=='undefined'?json_CrudeOil_4:null,{pane:'pipes',
  style:{color:'rgba(196,60,57,1)',weight:1.3,opacity:1,fillOpacity:0},
  onEachFeature:(f,l)=>{const p=f.properties||{};l.bindPopup(`<b>Crude oil pipeline</b><br>${p.Opername||''}${p.Pipename?'<br>'+p.Pipename:''}`);}}).addTo(map);
const gasLayer=L.geoJSON(typeof json_NaturalGas_3!=='undefined'?json_NaturalGas_3:null,{pane:'pipes',
  style:{color:'rgba(141,90,153,1)',weight:1,opacity:1,fillOpacity:0},
  onEachFeature:(f,l)=>{const p=f.properties||{};l.bindPopup(`<b>Natural gas pipeline</b><br>${p.TYPEPIPE||''}${(p.Operator||p.Status)?'<br>'+(p.Operator||p.Status):''}`);}}).addTo(map);

const el=id=>document.getElementById(id);
let ev='harvey', scen='historical', curVar='rise', idx=0, playing=false, timer=null;
let store={};   // store["<ev>_<scen>"][var] = {units, frames:[{t,url}]}
const hcanvas=document.createElement('canvas'); let hctx=null, hImg=new Image(), hReady=false;
hImg.crossOrigin='anonymous';
hImg.onload=()=>{ hcanvas.width=hImg.naturalWidth; hcanvas.height=hImg.naturalHeight;
  hctx=hcanvas.getContext('2d',{willReadFrequently:true}); hctx.drawImage(hImg,0,0); hReady=true; };

function effVar(){ return scen==='diff' ? 'diff' : curVar; }
function drawLegend(){
  const def=VARDEF[effVar()];
  el('legTitle').textContent=def.legend;
  el('legRows').innerHTML=def.ramp.map(([lo,hi,c])=>{
    let lbl;
    if(def.diverging){ lbl = lo<=-99?`< ${hi}` : (hi>=99?`> +${lo}` : `${lo} … ${hi}`); }
    else { lbl = hi>=99?`> ${lo}`:`${lo} – ${hi}`; }
    return `<div class="row"><span class="sw" style="background:rgb(${c})"></span>${lbl}</div>`;}).join('');
}
function curSet(){
  if(scen==='diff'){ return store[`${ev}_diff`] && store[`${ev}_diff`]['diff']; }
  return store[`${ev}_${scen}`] && store[`${ev}_${scen}`][curVar];
}
function curBounds(){ const s=curSet(); return (s&&s.bounds)?L.latLngBounds(s.bounds):L.latLngBounds(BOUNDS); }
function showFrame(i){
  const set=curSet(); if(!set||!set.frames.length){ overlay.setUrl(''); el('tlabel').textContent='no data'; return; }
  idx=Math.max(0,Math.min(i,set.frames.length-1));
  const f=set.frames[idx];
  overlay.setBounds(curBounds());
  overlay.setUrl(f.url); hReady=false; hImg.src=f.url;
  el('scrub').max=set.frames.length-1; el('scrub').value=idx;
  el('tlabel').textContent=f.t||`frame ${idx+1}/${set.frames.length}`;
}
function play(){ if(playing||!curSet())return; playing=true; el('playBtn').textContent='⏸';
  timer=setInterval(()=>{ const n=curSet().frames.length; showFrame((idx+1)%n); }, +el('speed').value); }
function pause(){ playing=false; el('playBtn').textContent='▶'; clearInterval(timer); timer=null; }
el('playBtn').onclick=()=>playing?pause():play();
el('scrub').oninput=e=>{ pause(); showFrame(+e.target.value); };
el('speed').onchange=()=>{ if(playing){pause();play();} };
el('opacity').oninput=e=>{ overlay.setOpacity(+e.target.value); el('opval').textContent=Math.round(e.target.value*100)+'%'; };
el('pipeCrude').onchange=e=>{ e.target.checked?crudeLayer.addTo(map):map.removeLayer(crudeLayer); };
el('pipeGas').onchange=e=>{ e.target.checked?gasLayer.addTo(map):map.removeLayer(gasLayer); };

function seg(id,attr,setter){ el(id).addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  [...el(id).children].forEach(x=>x.classList.remove('active')); b.classList.add('active'); setter(b.dataset[attr]);
  drawLegend(); showFrame(0); }); }
seg('eventseg','ev',v=>ev=v);
seg('scenseg','scen',v=>{ scen=v; const d=(v==='diff');
  el('varseg').style.opacity=d?0.4:1; el('varseg').style.pointerEvents=d?'none':'auto'; });
seg('varseg','var',v=>curVar=v);

function nearestBand(r,g,b,v){ let best=null,bd=1e9;
  for(const[lo,hi,c]of VARDEF[v].ramp){ const d=(r-c[0])**2+(g-c[1])**2+(b-c[2])**2; if(d<bd){bd=d;best=[lo,hi];} }
  return bd<1200?best:null; }
map.on('mousemove',e=>{
  const active=el('hoverToggle').checked || !playing;
  if(!active){ el('info').innerHTML='Playing… pause to read values'; return; }
  if(!hReady||!hctx) return;
  const p=L.CRS.EPSG3857.project(e.latlng), [[s,w],[n,ee]]=((curSet()&&curSet().bounds)||BOUNDS);
  const pw=L.CRS.EPSG3857.project(L.latLng(s,w)), pe=L.CRS.EPSG3857.project(L.latLng(n,ee));
  const col=Math.floor((p.x-pw.x)/(pe.x-pw.x)*hcanvas.width);
  const row=Math.floor((pe.y-p.y)/(pe.y-pw.y)*hcanvas.height);
  const v=effVar(), name={depth:'Depth',rise:'Rise',wind:'Wind',diff:'Δ depth'}[v], u=VARDEF[v].units;
  if(col<0||row<0||col>=hcanvas.width||row>=hcanvas.height){ el('info').innerHTML=`<b>${name}:</b> —`; return; }
  const px=hctx.getImageData(col,row,1,1).data;
  if(px[3]===0){ el('info').innerHTML=`<b>${name}:</b> ${v==='wind'?'—':(v==='diff'?'~0':'dry / sea')}`; return; }
  const band=nearestBand(px[0],px[1],px[2],v);
  el('info').innerHTML=band?`<b>${name}:</b> ${band[0]}–${band[1]} ${u}`:`<b>${name}:</b> —`;
});

/* ---- click-a-point time series (samples the clicked pixel across every frame) ---- */
function bandVal(v,r,g,b){ const bd=nearestBand(r,g,b,v); if(!bd) return null;
  let [lo,hi]=bd; if(hi>=99) return lo; if(lo<=-99) return hi; return +((lo+hi)/2).toFixed(2); }
const _sCanvas=document.createElement('canvas'); let _sctx=null;
function _loadImg(url){ return new Promise((res,rej)=>{ const im=new Image(); im.crossOrigin='anonymous';
  im.onload=()=>res(im); im.onerror=rej; im.src=url; }); }
async function seriesAt(evk,sc,v,col,row){
  const set=store[`${evk}_${sc}`] && store[`${evk}_${sc}`][v]; if(!set) return null;
  const out=[];
  for(const fr of set.frames){
    let im; try{ im=await _loadImg(fr.url);}catch(e){ out.push({t:fr.t,val:null}); continue; }
    if(_sCanvas.width!==im.naturalWidth){ _sCanvas.width=im.naturalWidth; _sCanvas.height=im.naturalHeight;
      _sctx=_sCanvas.getContext('2d',{willReadFrequently:true}); }
    _sctx.clearRect(0,0,_sCanvas.width,_sCanvas.height); _sctx.drawImage(im,0,0);
    const c=Math.max(0,Math.min(col,_sCanvas.width-1)), r2=Math.max(0,Math.min(row,_sCanvas.height-1));
    const px=_sctx.getImageData(c,r2,1,1).data;
    out.push({t:fr.t, val: px[3]===0?null:bandVal(v,px[0],px[1],px[2])});
  }
  return out;
}
function sparkline(hist,future,v){
  const W=280,H=140,pad={l:34,r:8,t:10,b:22};
  const all=[...(hist||[]),...(future||[])].map(d=>d.val).filter(x=>x!=null);
  if(!all.length) return `<div style="font:12px system-ui;color:#667">No ${VARDEF[v].units} values here (dry / outside domain).</div>`;
  const ymax=Math.max(...all)*1.15||1, n=Math.max((hist||[]).length,(future||[]).length,2);
  const X=i=>pad.l+(W-pad.l-pad.r)*(i/(n-1)), Y=y=>H-pad.b-(H-pad.t-pad.b)*(y/ymax);
  const path=s=>{ if(!s) return ''; let d='',pen=false;
    s.forEach((p,i)=>{ if(p.val==null){pen=false;return;} d+=(pen?'L':'M')+X(i).toFixed(1)+' '+Y(p.val).toFixed(1)+' '; pen=true; }); return d; };
  const grid=[0,ymax/2,ymax].map(y=>`<line x1="${pad.l}" y1="${Y(y).toFixed(1)}" x2="${W-pad.r}" y2="${Y(y).toFixed(1)}" stroke="#e5e8ec"/>`
      +`<text x="${pad.l-4}" y="${(Y(y)+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#889">${y.toFixed(y<10?1:0)}</text>`).join('');
  const t0=(hist&&hist[0]&&hist[0].t)||'', t1=(hist&&hist[hist.length-1]&&hist[hist.length-1].t)||'';
  return `<svg width="${W}" height="${H}" style="display:block">${grid}
    <path d="${path(hist)}" fill="none" stroke="#2166ac" stroke-width="1.8"/>
    <path d="${path(future)}" fill="none" stroke="#e6791b" stroke-width="1.8" stroke-dasharray="4 3"/>
    <text x="${pad.l}" y="${H-6}" font-size="9" fill="#889">${(t0||'').slice(5,10)}</text>
    <text x="${W-pad.r}" y="${H-6}" text-anchor="end" font-size="9" fill="#889">${(t1||'').slice(5,10)}</text>
  </svg>
  <div style="font:11px system-ui;color:#556;margin-top:2px">
    <span style="color:#2166ac">■</span> Historical &nbsp; <span style="color:#e6791b">■</span> Future &nbsp;·&nbsp; ${VARDEF[v].legend}</div>`;
}
let clickMarker=null;
map.on('click',async e=>{
  const v=(curVar==='diff'?'rise':curVar);
  const ref=store[`${ev}_historical`] && store[`${ev}_historical`][v]; if(!ref) return;
  const p=L.CRS.EPSG3857.project(e.latlng), [[s,w],[n,ee]]=(ref.bounds||BOUNDS);
  const pw=L.CRS.EPSG3857.project(L.latLng(s,w)), pe=L.CRS.EPSG3857.project(L.latLng(n,ee));
  const dim=await _loadImg(ref.frames[0].url);
  const col=Math.floor((p.x-pw.x)/(pe.x-pw.x)*dim.naturalWidth);
  const row=Math.floor((pe.y-p.y)/(pe.y-pw.y)*dim.naturalHeight);
  if(col<0||row<0||col>=dim.naturalWidth||row>=dim.naturalHeight) return;
  if(clickMarker) map.removeLayer(clickMarker);
  clickMarker=L.circleMarker(e.latlng,{radius:5,color:'#111',weight:2,fillColor:'#fff',fillOpacity:1}).addTo(map);
  const name={depth:'Depth',rise:'Rise',wind:'Wind'}[v];
  const pop=L.popup({maxWidth:320,minWidth:300}).setLatLng(e.latlng)
    .setContent(`<b>${name} time series</b><br><span style="font:11px system-ui;color:#667">${e.latlng.lat.toFixed(3)}, ${e.latlng.lng.toFixed(3)} — sampling…</span>`).openOn(map);
  const [hist,future]=await Promise.all([seriesAt(ev,'historical',v,col,row), seriesAt(ev,'future',v,col,row)]);
  pop.setContent(`<b>${name} time series</b> <span style="font:11px system-ui;color:#667">(${e.latlng.lat.toFixed(3)}, ${e.latlng.lng.toFixed(3)})</span><br>${sparkline(hist,future,v)}`);
});

async function loadOne(evk,sc,v){
  const r=await fetch(`${DATA_DIR}${evk}_${sc}/manifest_${v}.json`,{cache:'no-store'});
  if(!r.ok) return null;
  const m=await r.json();
  return {units:m.units, bounds:m.bounds||null, frames:m.frames.map(fr=>({t:fr.t,url:`${DATA_DIR}${evk}_${sc}/${fr.png}`}))};
}
(async function init(){
  drawLegend();
  let any=false;
  for(const evk of EVENTS) for(const sc of SCENARIOS){
    const k=`${evk}_${sc}`, o={};
    for(const v of VARS){ const s=await loadOne(evk,sc,v); if(s){o[v]=s; any=true;} }
    if(Object.keys(o).length) store[k]=o;
  }
  for(const evk of EVENTS){ const s=await loadOne(evk,'diff','diff'); if(s){ store[`${evk}_diff`]={diff:s}; any=true; } }
  if(!any){
    el('mode').textContent='NO DATA';
    const b=el('banner'); b.style.display='block';
    b.textContent='No frames found under "'+DATA_DIR+'". Serve this folder over HTTP: run  python3 -m http.server  here, then open http://localhost:8000/animation.html';
    return;
  }
  el('mode').textContent='LIVE';
  showFrame(0);
})();
</script>
</body>
</html>
