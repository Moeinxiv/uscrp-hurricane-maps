<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>USCRP Hurricane Maps — Animated Inundation & Wind</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --ink:#111826; --muted:#6b7480; --faint:#98a1ac;
    --line:rgba(17,24,38,.07); --line2:rgba(17,24,38,.11);
    --surface:rgba(255,255,255,.70); --accent:#2f6bd8;
    --radius:16px; --shadow:0 6px 26px rgba(17,24,38,.11),0 1px 2px rgba(17,24,38,.05);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  html,body,#map{width:100%;height:100%;margin:0;padding:0}
  #map{background:#eef2f5;font-family:var(--font)}
  .ui-panel{background:var(--surface);backdrop-filter:blur(16px) saturate(1.15);-webkit-backdrop-filter:blur(16px) saturate(1.15);
    border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    font-family:var(--font);color:var(--ink)}
  .ui-panel h4{margin:0 0 11px;font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--faint);
    text-align:left;font-weight:600}
  #timeline{position:absolute;left:50%;transform:translateX(-50%);bottom:20px;z-index:9999;width:min(720px,92vw);padding:14px 18px}
  #timeline .row{display:flex;align-items:center;gap:14px}
  #playBtn{flex:0 0 auto;width:40px;height:40px;border:none;border-radius:50%;cursor:pointer;background:var(--ink);
    color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;transition:transform .12s ease,opacity .2s}
  #playBtn:hover{opacity:.86;transform:scale(1.06)}
  #scrub{flex:1 1 auto}
  #tlabel{flex:0 0 auto;font-variant-numeric:tabular-nums;font-size:12.5px;font-weight:600;min-width:160px;text-align:right;color:var(--ink)}
  input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;background:var(--line2);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 1px 4px rgba(47,107,216,.45)}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:var(--accent);cursor:pointer}
  #timeline .controls{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:14px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
  #timeline .controls label{display:flex;align-items:center;gap:6px;font-weight:500}
  select{font:inherit;font-size:11.5px;color:var(--ink);border:1px solid var(--line2);border-radius:8px;padding:3px 7px;background:#fff}
  .seg{display:inline-flex;background:rgba(17,24,38,.045);border:1px solid var(--line);border-radius:11px;padding:2px;gap:2px}
  .seg button{border:none;background:transparent;padding:5px 11px;cursor:pointer;font-size:11.5px;font-weight:500;color:var(--muted);border-radius:8px;transition:background .15s,color .15s,box-shadow .15s}
  .seg button:hover{color:var(--ink)}
  .seg button.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(17,24,38,.14);font-weight:600}
  #ctrl{position:absolute;top:16px;right:16px;z-index:9999;padding:17px 18px;width:238px}
  #ctrl .grp{margin-bottom:16px}
  #ctrl .grp:last-child{margin-bottom:0}
  #ctrl .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin-bottom:8px}
  #ctrl label.op{display:flex;justify-content:space-between;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px}
  #legend{position:absolute;right:16px;bottom:150px;z-index:9999;padding:14px 16px;font-size:11.5px;width:192px}
  #legend .row{display:flex;align-items:center;margin:4px 0;color:var(--ink)}
  #legend .sw{width:12px;height:12px;border-radius:3px;margin-right:9px;border:1px solid rgba(0,0,0,.08);flex:0 0 auto}
  #legNote{margin-top:10px;font-size:10px;line-height:1.45;color:var(--muted);border-top:1px solid var(--line);padding-top:8px}
  #legNote:empty{display:none}
  #windrose{position:absolute;left:16px;bottom:150px;z-index:9999;padding:11px 13px;width:150px;display:none}
  #windrose canvas{display:block;margin:0 auto}
  #info{position:absolute;top:50%;left:16px;transform:translateY(-50%);z-index:9999;padding:12px 15px;font-size:12.5px;min-width:172px;color:var(--ink)}
  #banner{position:absolute;top:0;left:0;right:0;z-index:10000;background:#b45309;color:#fff;
    font:500 12px/1.4 var(--font);text-align:center;padding:6px 10px;display:none}
  .leaflet-control-zoom a{border-radius:8px!important;color:var(--muted)!important}
  .leaflet-bar{border:1px solid var(--line)!important;box-shadow:var(--shadow)!important}
</style>
</head>
<body>
<div id="banner"></div>
<div id="map"></div>
<div id="info" class="ui-panel">Hover the map for values…</div>

<div id="ctrl" class="ui-panel">
  <div class="grp"><div class="lbl">Event</div>
    <div class="seg" id="eventseg">
      <button data-ev="harvey" class="active">Harvey</button>
      <button data-ev="rita">Rita</button>
      <button data-ev="ike">Ike</button>
    </div>
  </div>
  <div class="grp"><div class="lbl">Scenario</div>
    <div class="seg" id="scenseg">
      <button data-scen="historical" class="active">Historical</button>
      <button data-scen="future">Future</button>
      <button data-scen="diff" title="Future minus Historical peak depth">Δ Fut−Hist</button>
    </div>
  </div>
  <div class="grp"><div class="lbl">Variable</div>
    <div class="seg" id="varseg" style="flex-wrap:wrap">
      <button data-var="depth">Depth</button>
      <button data-var="rise" class="active">Rise</button>
      <button data-var="wind">Wind</button>
      <button data-var="overland">Overland</button>
    </div>
  </div>
  <div class="grp" id="modegrp" style="display:none"><div class="lbl">Overland style</div>
    <div class="seg" id="modeseg">
      <button data-mode="hybrid" title="Flooding in color, permanent water grey">Hybrid</button>
      <button data-mode="flood" title="Storm flooding only">Flood-only</button>
      <button data-mode="full" class="active" title="Whole domain incl. Gulf">Full</button>
    </div>
  </div>
  <div class="grp"><div class="lbl">Infrastructure</div>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#34495e;margin-bottom:5px"><input type="checkbox" id="pipeCrude" checked> Crude oil pipelines</label>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#34495e"><input type="checkbox" id="pipeGas" checked> Natural gas pipelines</label>
  </div>
  <div class="grp">
    <label class="op"><span>Layer opacity</span><span id="opval">85%</span></label>
    <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.85" style="width:100%">
  </div>
</div>

<div id="legend" class="ui-panel"><h4 id="legTitle">Max Depth (m)</h4><div id="legRows"></div><div id="legNote"></div></div>

<div id="windrose" class="ui-panel"><h4>Wind rose — from</h4><canvas id="roseCanvas" width="132" height="132"></canvas><div id="rosePeak" style="text-align:center;font-size:11px;font-weight:600;color:#34495e;margin-top:2px"></div></div>

<div id="timeline" class="ui-panel">
  <div class="row">
    <button id="playBtn" title="Play/Pause">▶</button>
    <input type="range" id="scrub" min="0" max="0" step="1" value="0">
    <span id="tlabel">—</span>
  </div>
  <div class="controls">
    <label>Speed
      <select id="speed"><option value="1000">Slow</option><option value="600" selected>Normal</option><option value="300">Fast</option></select>
    </label>
    <label><input type="checkbox" id="hoverToggle"> Hover values (auto when paused)</label>
    <span id="mode" style="opacity:.7">loading…</span>
  </div>
</div>

<script src="data/CrudeOil_4.js"></script>
<script src="data/NaturalGas_3.js"></script>
<script>
/* =====================================================================
   USCRP Hurricane Maps — animated inundation + wind, all events.
   Frames from extract_flowfm_nc.py (6-hourly, EPSG:3857 grid on the
   existing map bounds; sea-masked depth + edge-trimmed).
   Layout: data/frames/<event>_<scenario>/{manifest_<var>.json, <var>/frame_NNN.png}
   Hover reads the frame pixel colour -> legend band (TIFs not shipped).
   ===================================================================== */
const DATA_DIR="data/frames/";
const EVENTS=["harvey","rita","ike"];
const SCENARIOS=["historical","future"];
const VARS=["depth","rise","wind","overland_full","overland_flood","overland_hybrid"];
const BOUNDS=[[28.974991429868123,-94.33611991576419],[30.227087808884963,-93.48667298310077]];
const DEPTH_RAMP=[[0.1,1,[70,98,216]],[1,2,[53,171,248]],[2,3,[27,229,181]],[3,4,[116,254,93]],
  [4,5,[201,239,52]],[5,7.5,[251,185,56]],[7.5,10,[245,105,24]],[10,15,[201,41,3]],[15,99,[122,4,3]]];
const WIND_RAMP=[[0,8,[237,248,251]],[8,17,[179,205,227]],[17,25,[140,150,198]],[25,33,[136,86,167]],
  [33,43,[129,15,124]],[43,50,[255,178,76]],[50,58,[253,141,60]],[58,70,[240,59,32]],[70,99,[189,0,38]]];
const RISE_RAMP=[[0.05,0.1,[215,235,255]],[0.1,0.2,[170,205,245]],[0.2,0.3,[110,170,230]],[0.3,0.4,[60,180,170]],
  [0.4,0.5,[120,205,90]],[0.5,0.75,[215,215,70]],[0.75,1.0,[250,170,55]],[1.0,1.5,[240,110,45]],[1.5,99,[200,40,40]]];
const DIFF_RAMP=[[-99,-0.5,[33,102,172]],[-0.5,-0.2,[103,169,207]],[-0.2,-0.05,[180,210,235]],
  [0.05,0.2,[250,200,170]],[0.2,0.5,[239,138,98]],[0.5,99,[178,24,43]]];
const VARDEF={depth:{ramp:DEPTH_RAMP,units:'m',legend:'Max water depth (m)',note:'Shows <b>total</b> water depth, which is dominated by the permanent Gulf &amp; bays — so all three storms look similar here <i>by design</i>. To compare storms, switch to <b>Rise</b> (surge above baseline) or <b>Δ Future−Historical</b>.'},
              rise:{ramp:RISE_RAMP,units:'m',legend:'Water rise (m)'},
              wind:{ramp:WIND_RAMP,units:'m/s',legend:'Wind speed (m/s)'},
              diff:{ramp:DIFF_RAMP,units:'m',legend:'Future − Historical (m)',diverging:true},
              overland_full:{ramp:DEPTH_RAMP,units:'m',legend:'Overland depth — full (m)',note:'Corrected full-extent overland max depth (fixes the Rita clip &amp; Ike datum offset). Includes permanent water, so the Gulf looks similar across storms — switch style to <b>Flood-only</b> or <b>Hybrid</b> to isolate storm-driven flooding.'},
              overland_flood:{ramp:DEPTH_RAMP,units:'m',legend:'Storm flood depth (m)',note:'Storm-driven flooding only — permanent open water removed. <b>Rita</b> floods far more than Harvey/Ike, which barely flood overland in this Sabine domain.'},
              overland_hybrid:{ramp:DEPTH_RAMP,units:'m',legend:'Storm flood depth (m)',note:'Storm-driven flooding in color; permanent water shown <span style="color:#8a9aa6">grey</span> for context.'}};

const map=L.map('map',{zoomControl:true}).fitBounds(BOUNDS);
L.tileLayer('https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd',maxZoom:19,attribution:'© OpenStreetMap © CARTO'}).addTo(map);
let overlay=L.imageOverlay('',BOUNDS,{opacity:0.85,interactive:false}).addTo(map);

// --- infrastructure (pipelines), drawn above the animated depth/wind layer ---
map.createPane('pipes'); map.getPane('pipes').style.zIndex=500;
const crudeLayer=L.geoJSON(typeof json_CrudeOil_4!=='undefined'?json_CrudeOil_4:null,{pane:'pipes',
  style:{color:'rgba(196,60,57,1)',weight:1.3,opacity:1,fillOpacity:0},
  onEachFeature:(f,l)=>{const p=f.properties||{};l.bindPopup(`<b>Crude oil pipeline</b><br>${p.Opername||''}${p.Pipename?'<br>'+p.Pipename:''}`);}}).addTo(map);
const gasLayer=L.geoJSON(typeof json_NaturalGas_3!=='undefined'?json_NaturalGas_3:null,{pane:'pipes',
  style:{color:'rgba(141,90,153,1)',weight:1,opacity:1,fillOpacity:0},
  onEachFeature:(f,l)=>{const p=f.properties||{};l.bindPopup(`<b>Natural gas pipeline</b><br>${p.TYPEPIPE||''}${(p.Operator||p.Status)?'<br>'+(p.Operator||p.Status):''}`);}}).addTo(map);

const el=id=>document.getElementById(id);
let ev='harvey', scen='historical', curVar='rise', omode='full', idx=0, playing=false, timer=null;
let roseData=null;
let store={};   // store["<ev>_<scen>"][var] = {units, frames:[{t,url}]}
const hcanvas=document.createElement('canvas'); let hctx=null, hImg=new Image(), hReady=false;
hImg.crossOrigin='anonymous';
hImg.onload=()=>{ hcanvas.width=hImg.naturalWidth; hcanvas.height=hImg.naturalHeight;
  hctx=hcanvas.getContext('2d',{willReadFrequently:true}); hctx.drawImage(hImg,0,0); hReady=true; };
// exact-value data tile for the current frame (8-bit LA png; value = R/255*dVmax where alpha>0)
const dcanvas=document.createElement('canvas'); let dctx=null, dImg=new Image(), dReady=false, dVmax=null, dSigned=false;
dImg.crossOrigin='anonymous';
dImg.onload=()=>{ dcanvas.width=dImg.naturalWidth; dcanvas.height=dImg.naturalHeight;
  dctx=dcanvas.getContext('2d',{willReadFrequently:true}); dctx.drawImage(dImg,0,0); dReady=true; };

function effVar(){ if(scen==='diff') return 'diff'; return curVar==='overland' ? 'overland_'+omode : curVar; }
function drawLegend(){
  const def=VARDEF[effVar()];
  el('legTitle').textContent=def.legend;
  el('legNote').innerHTML=def.note||'';
  el('legRows').innerHTML=def.ramp.map(([lo,hi,c])=>{
    let lbl;
    if(def.diverging){ lbl = lo<=-99?`< ${hi}` : (hi>=99?`> +${lo}` : `${lo} … ${hi}`); }
    else { lbl = hi>=99?`> ${lo}`:`${lo} – ${hi}`; }
    return `<div class="row"><span class="sw" style="background:rgb(${c})"></span>${lbl}</div>`;}).join('');
}
function curSet(){
  if(scen==='diff'){ return store[`${ev}_diff`] && store[`${ev}_diff`]['diff']; }
  return store[`${ev}_${scen}`] && store[`${ev}_${scen}`][effVar()];
}
function curBounds(){ const s=curSet(); return (s&&s.bounds)?L.latLngBounds(s.bounds):L.latLngBounds(BOUNDS); }
function drawRose(){
  const key=`${ev}_${scen}`, show=(effVar()==='wind')&&roseData&&roseData[key];
  const panel=el('windrose'); if(!show){ panel.style.display='none'; return; }
  panel.style.display='block';
  const rd=roseData[key], fr=(rd.frames&&rd.frames[Math.min(idx,rd.frames.length-1)])||{bins:[],peak:0};
  const cv=el('roseCanvas'), ctx=cv.getContext('2d'), S=cv.width, cx=S/2, cy=S/2, R=S/2-16;
  ctx.clearRect(0,0,S,S);
  ctx.strokeStyle='rgba(0,0,0,.12)'; [0.5,1].forEach(f=>{ctx.beginPath();ctx.arc(cx,cy,R*f,0,2*Math.PI);ctx.stroke();});
  const NB=rd.nbins||16, bins=fr.bins||[];
  for(let i=0;i<NB;i++){ const b=bins[i]||0; if(b<=0) continue;
    const c=(i+0.5)*(360/NB)-90, w=(360/NB)/2*0.88;
    const a0=(c-w)*Math.PI/180, a1=(c+w)*Math.PI/180, r=Math.max(2,b*R);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a0,a1); ctx.closePath();
    ctx.fillStyle='rgba(52,120,180,.78)'; ctx.fill(); }
  ctx.fillStyle='#5c6c7c'; ctx.font='bold 10px -apple-system,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('N',cx,cy-R-7); ctx.fillText('S',cx,cy+R+7); ctx.fillText('E',cx+R+8,cy); ctx.fillText('W',cx-R-8,cy);
  el('rosePeak').textContent = fr.peak ? ('peak '+fr.peak+' m/s') : '';
}
function showFrame(i){
  const set=curSet(); if(!set||!set.frames.length){ overlay.setUrl(''); el('tlabel').textContent='no data'; drawRose(); return; }
  idx=Math.max(0,Math.min(i,set.frames.length-1));
  const f=set.frames[idx];
  overlay.setBounds(curBounds());
  overlay.setUrl(f.url); hReady=false; hImg.src=f.url;
  dReady=false; dctx=null; if(f.data){ dVmax=set.vmax; dSigned=!!set.signed; dImg.src=f.data; } else { dVmax=null; }
  el('scrub').max=set.frames.length-1; el('scrub').value=idx;
  el('tlabel').textContent=f.t||`frame ${idx+1}/${set.frames.length}`;
  drawRose();
}
function play(){ if(playing||!curSet())return; playing=true; el('playBtn').textContent='⏸';
  timer=setInterval(()=>{ const n=curSet().frames.length; showFrame((idx+1)%n); }, +el('speed').value); }
function pause(){ playing=false; el('playBtn').textContent='▶'; clearInterval(timer); timer=null; }
el('playBtn').onclick=()=>playing?pause():play();
el('scrub').oninput=e=>{ pause(); showFrame(+e.target.value); };
el('speed').onchange=()=>{ if(playing){pause();play();} };
el('opacity').oninput=e=>{ overlay.setOpacity(+e.target.value); el('opval').textContent=Math.round(e.target.value*100)+'%'; };
el('pipeCrude').onchange=e=>{ e.target.checked?crudeLayer.addTo(map):map.removeLayer(crudeLayer); };
el('pipeGas').onchange=e=>{ e.target.checked?gasLayer.addTo(map):map.removeLayer(gasLayer); };

function seg(id,attr,setter){ el(id).addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
  [...el(id).children].forEach(x=>x.classList.remove('active')); b.classList.add('active'); setter(b.dataset[attr]);
  drawLegend(); showFrame(0); }); }
function updModeVis(){ el('modegrp').style.display=(curVar==='overland'&&scen!=='diff')?'block':'none'; }
seg('eventseg','ev',v=>ev=v);
seg('scenseg','scen',v=>{ scen=v; const d=(v==='diff');
  el('varseg').style.opacity=d?0.4:1; el('varseg').style.pointerEvents=d?'none':'auto'; updModeVis(); });
seg('varseg','var',v=>{ curVar=v; updModeVis(); });
seg('modeseg','mode',v=>{ omode=v; });

function nearestBand(r,g,b,v){ let best=null,bd=1e9;
  for(const[lo,hi,c]of VARDEF[v].ramp){ const d=(r-c[0])**2+(g-c[1])**2+(b-c[2])**2; if(d<bd){bd=d;best=[lo,hi];} }
  return bd<1200?best:null; }
map.on('mousemove',e=>{
  const active=el('hoverToggle').checked || !playing;
  if(!active){ el('info').innerHTML='Playing… pause to read values'; return; }
  if(!hReady||!hctx) return;
  const p=L.CRS.EPSG3857.project(e.latlng), [[s,w],[n,ee]]=((curSet()&&curSet().bounds)||BOUNDS);
  const pw=L.CRS.EPSG3857.project(L.latLng(s,w)), pe=L.CRS.EPSG3857.project(L.latLng(n,ee));
  const col=Math.floor((p.x-pw.x)/(pe.x-pw.x)*hcanvas.width);
  const row=Math.floor((pe.y-p.y)/(pe.y-pw.y)*hcanvas.height);
  const v=effVar(), name=v.indexOf('overland')===0?'Overland':{depth:'Depth',rise:'Rise',wind:'Wind',diff:'Δ depth'}[v], u=VARDEF[v].units;
  if(col<0||row<0||col>=hcanvas.width||row>=hcanvas.height){ el('info').innerHTML=`<b>${name}:</b> —`; return; }
  const px=hctx.getImageData(col,row,1,1).data;
  const dryTxt=v==='wind'?'—':(v==='diff'?'~0':(v.indexOf('overland')===0?'not flooded':'dry / sea'));
  if(px[3]===0){ el('info').innerHTML=`<b>${name}:</b> ${dryTxt}`; return; }
  if(v==='overland_hybrid' && Math.abs(px[0]-176)<10 && Math.abs(px[1]-190)<10 && Math.abs(px[2]-199)<10){ el('info').innerHTML=`<b>${name}:</b> permanent water`; return; }
  if(dReady && dctx && dVmax!=null){
    const dc=Math.floor((p.x-pw.x)/(pe.x-pw.x)*dcanvas.width), dr2=Math.floor((pe.y-p.y)/(pe.y-pw.y)*dcanvas.height);
    if(dc>=0&&dr2>=0&&dc<dcanvas.width&&dr2<dcanvas.height){
      const dp=dctx.getImageData(dc,dr2,1,1).data;
      if(dp[3]>0){ const val=dSigned?(dp[0]/255*2*dVmax-dVmax):(dp[0]/255*dVmax); const sg=(dSigned&&val>0)?'+':''; el('info').innerHTML=`<b>${name}:</b> ${sg}${val.toFixed(2)} ${u}`; return; }
    }
  }
  const band=nearestBand(px[0],px[1],px[2],v);
  el('info').innerHTML=band?`<b>${name}:</b> ${band[0]}–${band[1]} ${u}`:`<b>${name}:</b> —`;
});

/* ---- click-a-point time series (samples the clicked pixel across every frame) ---- */
function bandVal(v,r,g,b){ const bd=nearestBand(r,g,b,v); if(!bd) return null;
  let [lo,hi]=bd; if(hi>=99) return lo; if(lo<=-99) return hi; return +((lo+hi)/2).toFixed(2); }
const _sCanvas=document.createElement('canvas'); let _sctx=null;
function _loadImg(url){ return new Promise((res,rej)=>{ const im=new Image(); im.crossOrigin='anonymous';
  im.onload=()=>res(im); im.onerror=rej; im.src=url; }); }
async function seriesAt(evk,sc,v,fx,fy){
  const set=store[`${evk}_${sc}`] && store[`${evk}_${sc}`][v]; if(!set) return null;
  const vmax=set.vmax, out=[];
  for(const fr of set.frames){
    const url=fr.data||fr.url, exact=(!!fr.data && vmax!=null);
    let im; try{ im=await _loadImg(url);}catch(e){ out.push({t:fr.t,val:null}); continue; }
    if(_sCanvas.width!==im.naturalWidth){ _sCanvas.width=im.naturalWidth; _sCanvas.height=im.naturalHeight;
      _sctx=_sCanvas.getContext('2d',{willReadFrequently:true}); }
    _sctx.clearRect(0,0,_sCanvas.width,_sCanvas.height); _sctx.drawImage(im,0,0);
    const c=Math.max(0,Math.min(Math.floor(fx*im.naturalWidth),im.naturalWidth-1)),
          r2=Math.max(0,Math.min(Math.floor(fy*im.naturalHeight),im.naturalHeight-1));
    const px=_sctx.getImageData(c,r2,1,1).data;
    out.push({t:fr.t, val: px[3]===0?null:(exact ? +(px[0]/255*vmax).toFixed(2) : bandVal(v,px[0],px[1],px[2]))});
  }
  return out;
}
function sparkline(hist,future,v){
  const W=280,H=140,pad={l:34,r:8,t:10,b:22};
  const all=[...(hist||[]),...(future||[])].map(d=>d.val).filter(x=>x!=null);
  if(!all.length) return `<div style="font:12px system-ui;color:#667">No ${VARDEF[v].units} values here (dry / outside domain).</div>`;
  const ymax=Math.max(...all)*1.15||1, n=Math.max((hist||[]).length,(future||[]).length,2);
  const X=i=>pad.l+(W-pad.l-pad.r)*(i/(n-1)), Y=y=>H-pad.b-(H-pad.t-pad.b)*(y/ymax);
  const path=s=>{ if(!s) return ''; let d='',pen=false;
    s.forEach((p,i)=>{ if(p.val==null){pen=false;return;} d+=(pen?'L':'M')+X(i).toFixed(1)+' '+Y(p.val).toFixed(1)+' '; pen=true; }); return d; };
  const grid=[0,ymax/2,ymax].map(y=>`<line x1="${pad.l}" y1="${Y(y).toFixed(1)}" x2="${W-pad.r}" y2="${Y(y).toFixed(1)}" stroke="#e5e8ec"/>`
      +`<text x="${pad.l-4}" y="${(Y(y)+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#889">${y.toFixed(y<10?1:0)}</text>`).join('');
  const t0=(hist&&hist[0]&&hist[0].t)||'', t1=(hist&&hist[hist.length-1]&&hist[hist.length-1].t)||'';
  return `<svg width="${W}" height="${H}" style="display:block">${grid}
    <path d="${path(hist)}" fill="none" stroke="#2166ac" stroke-width="1.8"/>
    <path d="${path(future)}" fill="none" stroke="#e6791b" stroke-width="1.8" stroke-dasharray="4 3"/>
    <text x="${pad.l}" y="${H-6}" font-size="9" fill="#889">${(t0||'').slice(5,10)}</text>
    <text x="${W-pad.r}" y="${H-6}" text-anchor="end" font-size="9" fill="#889">${(t1||'').slice(5,10)}</text>
  </svg>
  <div style="font:11px system-ui;color:#556;margin-top:2px">
    <span style="color:#2166ac">■</span> Historical &nbsp; <span style="color:#e6791b">■</span> Future &nbsp;·&nbsp; ${VARDEF[v].legend}</div>`;
}
let clickMarker=null;
map.on('click',async e=>{
  const v=(curVar==='diff'?'rise':(curVar==='overland'?'overland_'+omode:curVar));
  const ref=store[`${ev}_historical`] && store[`${ev}_historical`][v]; if(!ref) return;
  const p=L.CRS.EPSG3857.project(e.latlng), [[s,w],[n,ee]]=(ref.bounds||BOUNDS);
  const pw=L.CRS.EPSG3857.project(L.latLng(s,w)), pe=L.CRS.EPSG3857.project(L.latLng(n,ee));
  const fx=(p.x-pw.x)/(pe.x-pw.x), fy=(pe.y-p.y)/(pe.y-pw.y);
  if(fx<0||fy<0||fx>1||fy>1) return;
  if(clickMarker) map.removeLayer(clickMarker);
  clickMarker=L.circleMarker(e.latlng,{radius:5,color:'#111',weight:2,fillColor:'#fff',fillOpacity:1}).addTo(map);
  const name=(v.indexOf('overland')===0?'Overland flood':{depth:'Depth',rise:'Rise',wind:'Wind'}[v]);
  const pop=L.popup({maxWidth:320,minWidth:300}).setLatLng(e.latlng)
    .setContent(`<b>${name} time series</b><br><span style="font:11px system-ui;color:#667">${e.latlng.lat.toFixed(3)}, ${e.latlng.lng.toFixed(3)} — sampling…</span>`).openOn(map);
  const [hist,future]=await Promise.all([seriesAt(ev,'historical',v,fx,fy), seriesAt(ev,'future',v,fx,fy)]);
  pop.setContent(`<b>${name} time series</b> <span style="font:11px system-ui;color:#667">(${e.latlng.lat.toFixed(3)}, ${e.latlng.lng.toFixed(3)})</span><br>${sparkline(hist,future,v)}`);
});

async function loadOne(evk,sc,v){
  const r=await fetch(`${DATA_DIR}${evk}_${sc}/manifest_${v}.json`,{cache:'no-store'});
  if(!r.ok) return null;
  const m=await r.json();
  const frames=m.frames.map(fr=>({t:fr.t,url:`${DATA_DIR}${evk}_${sc}/${fr.png}`}));
  // attach exact-value numeric tiles (overland reuses the depth tiles = same total depth)
  let vmax=null, signed=false;
  const dvar=(v.indexOf('overland')===0)?'depth':v;
  if(dvar==='depth'||dvar==='rise'||dvar==='wind'||dvar==='diff'){
    try{ const dr=await fetch(`${DATA_DIR}${evk}_${sc}/datamanifest_${dvar}.json`,{cache:'no-store'});
      if(dr.ok){ const dm=await dr.json(); vmax=dm.vmax; signed=!!dm.signed;
        (dm.frames||[]).forEach((df,k)=>{ if(frames[k]) frames[k].data=`${DATA_DIR}${evk}_${sc}/${df.data}`; }); }
    }catch(e){}
  }
  return {units:m.units, bounds:m.bounds||null, vmax, signed, frames};
}
(async function init(){
  drawLegend();
  let any=false;
  for(const evk of EVENTS) for(const sc of SCENARIOS){
    const k=`${evk}_${sc}`, o={};
    for(const v of VARS){ const s=await loadOne(evk,sc,v); if(s){o[v]=s; any=true;} }
    if(Object.keys(o).length) store[k]=o;
  }
  for(const evk of EVENTS){ const s=await loadOne(evk,'diff','diff'); if(s){ store[`${evk}_diff`]={diff:s}; any=true; } }
  if(!any){
    el('mode').textContent='NO DATA';
    const b=el('banner'); b.style.display='block';
    b.textContent='No frames found under "'+DATA_DIR+'". Serve this folder over HTTP: run  python3 -m http.server  here, then open http://localhost:8000/animation.html';
    return;
  }
  try{ roseData=await (await fetch('data/wind_rose.json',{cache:'no-store'})).json(); }catch(e){ roseData=null; }
  el('mode').textContent='LIVE';
  showFrame(0);
})();
</script>
